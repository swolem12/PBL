[pytest]
testpaths = tests/e2e
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --timeout=60
    -v
markers =
    player: Tests for the Player persona
    coordinator: Tests for the League Coordinator persona
    director: Tests for the Club Director persona
    admin: Tests for the Site Admin persona
    auth: Authentication flow tests
    rbac: Role-based access control tests
    slow: Tests that take more than 30 seconds
    use_case: Use case metadata (id, name, persona, criteria)
