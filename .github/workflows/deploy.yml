name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Clean npm cache
        run: |
          npm cache clean --force
          rm -rf ~/.npm/_cacache

      - name: Install dependencies
        run: npm ci --prefer-online

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build static export
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY:             "AIzaSyC3r-AQYUqJBIfMjKDFdgK6bLenEc8Ncko"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:         "pickleleauge.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID:          "pickleleauge"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:      "pickleleauge.firebasestorage.app"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "481849102562"
          NEXT_PUBLIC_FIREBASE_APP_ID:              "1:481849102562:web:ec4ba61bcf1e5eaa1fcebb"
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID:      "G-KD1JTE4ET6"
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY:           ${{ secrets.RECAPTCHA_SITE_KEY }}
          NEXT_PUBLIC_APP_VERSION: "0.1.0"
          NEXT_PUBLIC_BUILD_SHA: ${{ github.sha }}
          NEXT_PUBLIC_BUILD_TIME: ${{ github.run_number }}
        run: npm run build

      # ---- Firebase backend deploys ---------------------------------------
      # Functions, Firestore rules, Firestore indexes, and Storage rules are
      # deployed via the Firebase CLI (the hosting action below only handles
      # hosting). Each step is idempotent — unchanged config is a no-op.
      #
      # Order matters: functions first so any tightened rules don't lock
      # out callable paths that haven't shipped yet; rules + indexes next;
      # storage last (the only one with no cross-dependencies).

      - name: Build Cloud Functions
        run: |
          cd functions
          npm ci --prefer-online
          npm run build

      - name: Authenticate Firebase CLI
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$SA_JSON" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is not set"
            exit 1
          fi
          echo "$SA_JSON" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Deploy Cloud Functions
        run: npx firebase-tools deploy --only functions --project pickleleauge --non-interactive --force

      - name: Deploy Firestore rules and indexes
        run: npx firebase-tools deploy --only firestore:rules,firestore:indexes --project pickleleauge --non-interactive --force

      - name: Deploy Storage rules
        run: npx firebase-tools deploy --only storage --project pickleleauge --non-interactive --force

      # ---- Hosting --------------------------------------------------------
      # Kept as a separate action for the PR-preview channel features.
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: pickleleauge
