name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Clean npm cache
        run: |
          npm cache clean --force
          rm -rf ~/.npm/_cacache

      - name: Install dependencies
        run: npm ci --prefer-online

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build static export
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY:             "AIzaSyC3r-AQYUqJBIfMjKDFdgK6bLenEc8Ncko"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:         "pickleleauge.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID:          "pickleleauge"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:      "pickleleauge.firebasestorage.app"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "481849102562"
          NEXT_PUBLIC_FIREBASE_APP_ID:              "1:481849102562:web:ec4ba61bcf1e5eaa1fcebb"
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID:      "G-KD1JTE4ET6"
          NEXT_PUBLIC_APP_VERSION: "0.1.0"
          NEXT_PUBLIC_BUILD_SHA: ${{ github.sha }}
          NEXT_PUBLIC_BUILD_TIME: ${{ github.run_number }}
          run: |
            echo "AUTH_DOMAIN=$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN"
            echo "PROJECT_ID=$NEXT_PUBLIC_FIREBASE_PROJECT_ID"
            echo "APP_ID=$NEXT_PUBLIC_FIREBASE_APP_ID"

            test -n "$NEXT_PUBLIC_FIREBASE_API_KEY"
            test -n "$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN"
            test -n "$NEXT_PUBLIC_FIREBASE_PROJECT_ID"
            test -n "$NEXT_PUBLIC_FIREBASE_APP_ID"
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: pickleleauge
